<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OneCampus - Sign In</title>
    <!-- Modern Premium Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/src/style.css">
</head>

<body class="login-body">

    <!-- Centered Minimalist Login Container -->
    <main class="login-minimal-container">
        <div class="login-minimal-card">
            
            <header class="login-header">
                <a href="/" class="login-logo-link">OneCampus</a>
                <p class="login-subtitle">Sign in to your campus dashboard.</p>
            </header>

            <!-- Sleek Portal Toggle Selector -->
            <div class="portal-selector-container">
                <button type="button" class="portal-select-btn active" data-portal="student">Student</button>
                <button type="button" class="portal-select-btn" data-portal="staff">Staff</button>
            </div>

            <form class="login-minimal-form" id="login-form" autocomplete="off">
                <!-- Username / Email Input -->
                <div class="minimal-input-group">
                    <label for="username-input" class="minimal-label">Email or Username</label>
                    <input type="text" id="username-input" class="minimal-input" required placeholder="name@campus.edu" autocomplete="off" />
                </div>

                <!-- Password Input -->
                <div class="minimal-input-group">
                    <div class="label-row">
                        <label for="password-input" class="minimal-label">Password</label>
                        <a href="#" class="minimal-forgot-link">Forgot?</a>
                    </div>
                    <div class="password-input-wrapper">
                        <input type="password" id="password-input" class="minimal-input" required placeholder="••••••••" autocomplete="off" />
                        <button type="button" id="password-toggle" class="minimal-toggle-btn" aria-label="Toggle Password Visibility">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                        </button>
                    </div>
                </div>

                <!-- Remember Device Option -->
                <div class="minimal-options">
                    <label class="remember-label">
                        <input type="checkbox" id="remember-device" />
                        <span class="custom-checkbox"></span>
                        Remember this device
                    </label>
                </div>

                <!-- Submit Button -->
                <button type="submit" class="minimal-submit-btn" id="submit-btn">
                    <span class="btn-text">Sign In</span>
                </button>
            </form>

            <footer class="login-footer">
                Don't have an account? <a href="#" class="minimal-signup-link">Sign Up</a>
            </footer>

        </div>
    </main>

    <!-- Main JavaScript Logic -->
    <script type="module" src="/src/app.js"></script>
</body>

</html>
